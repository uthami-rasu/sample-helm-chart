apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "backend.fullname" . }}-config
  labels:
    {{- include "backend.labels" . | nindent 4 }}
data:
  DB_URL: {{ .Values.database.url | quote }}
  DB_USERNAME: {{ .Values.database.username | quote }}
  JWT_EXPIRATION_MS: {{ .Values.jwt.expirationMs | quote }}